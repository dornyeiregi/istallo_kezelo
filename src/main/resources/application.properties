spring.application.name=istallo_kezelo

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/istallo_kezelo}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.name=${SPRING_SECURITY_USER_NAME:regi}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:123}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-me-0123456789abcdef}
jwt.expiration=${JWT_EXPIRATION:3600000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.to=${APP_MAIL_TO:}
app.mail.from=${APP_MAIL_FROM:}
app.storage.low-days=${APP_STORAGE_LOW_DAYS:14,7,2}
app.mail.reminder.days=${APP_MAIL_REMINDER_DAYS:7,2}
app.mail.reminder.cron=${APP_MAIL_REMINDER_CRON:0 5 7 * * *}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.mime.charset=UTF-8
